<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"  />

    
<link rel="stylesheet" href="shopping-list.css"/>

    <title>Document</title>
</head>

<body>

<div class="container"> <!--big container-->
     
    <header>  <!--container for logo+Shopping List-->
     <img src="./logo.svg" class="logo" />
     <a href="facebook.com">facebook</a>
     <h1 id="app-title">Shopping List</h1>
    </header>

    <form id="item-form">  <!--Form container-->
     <div class="form-control">
     <input 
      type="text" 
      id="item-input"
      class="form-input"
      name="item" 
      placeholder="Enter Item"/>
     </div>
     <!--select input-->
     <select name="priority" id="priority-input" class="form-input">
      <option value="0">Select Priority</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      </select>

      <!--checkbox input-->
      <input type="checkbox" id="checkbox" />Recurring Item
      <br>

        <div class="form-control">
          <button class="btn" type="submit">
          <i class="fa-solid fa-plus"></i>Add Item</button>
        </div> 
    </form>

      <div class="filter"> <!--container for filter form-->
       <input 
        type="text" 
        class="form-input-filter" 
        id="filter" 
        placeholder="Filter Items"/>
      </div>  

      <div> 
        <ul id="item-list" class="items" class="items parent">

         <li class="item"></li>
          <li>Apple
            <button class="remove-item btn-link text-red">
            <i class="fa-solid fa-xmark"></i>
            </button>
          </li>

          <li class="item"></li>
          <li>Grape
            <button class="remove-item btn-link text-purple">
            <i class="fa-solid fa-xmark"></i>
            </button>
          </li>

         <li class="item"></li>
           <li>Lemon
            <button class="remove-item btn-link text-yellow">
            <i class="fa-solid fa-xmark"></i>
            </button>
           </li>

         <li class="item"></li>
         <li>Orange
            <button class="remove-item btn-link text-orange">
            <i class="fa-solid fa-xmark"></i>
            </button>
         </li>

         </ul> 
    </div>
    <button id="clear" class="btn-clear">Clear all</button>
    
</div>
</div>

<script src="18.event-bubbling.js"></script>
</body>
</html>
